syntax = "proto3";

// SoiData represents a SoiData
message SoiData {
    string name = 1;
    string title = 2;
    string hash = 3;
    string uri = 4;
    repeated string tags = 5;
    int32 rage = 6;
    int32 numViews = 7;
    float numReads = 8;
    int32 comprehension = 9;
    int64 createdAt = 10;
    repeated UsageLog usageLog = 11;
}

// UsageLog represents a usage log of SoiData
message UsageLog {
    string type = 1;
    int64 usedAt = 2;
}

# This requires an ".env" file at the root of docker-compose directory to read variables.
version: "3.8"
services:
  server:
    build: .
    ports:
      - 8080:8080
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: "/etc/gcp/service-account.json"
    volumes:
      - type: bind
        source: ${SERVICE_ACCOUNT_DIR}
        target: "/etc/gcp"
